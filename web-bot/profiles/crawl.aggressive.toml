# Aggressive crawl profile.
#
# Higher concurrency for machines with enough CPU and memory.
# Not ideal for debugging correctness.
#
# cat urls.txt | web-bot crawl --config web-bot/config/crawl.aggressive.toml
#

# [input]
# urls = ["-"]
# format = "text"
# url-pointer = "/url"
# attach-provenance = false

# [tags]
# global = ["run:aggressive"]
# pointers = []

# [output]
# format = "human"

[budget]
pages = 25
total-pages = 20000
depth = 1
frontier-items = 250000

# [runtime]
# jobs = 24
# sessions = 6
# tabs = 4
# cache-jobs = 96
# rotate = 250
# timeout-secs = 45

[runtime]
jobs = 16
sessions = 1
tabs = 16
timeout-secs = 12

# [profile]
# strategy = "by-seed-host"
# key = "default"

strategy = "single"
key = "bulk-depth0"

# [cache]
# enabled = true
# namespace = "default"
